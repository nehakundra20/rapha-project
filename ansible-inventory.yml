all:
  vars:
    # The generated inventory is assumed to be used from the clab host.
    # Hence no http proxy should be used. Therefore we make sure the http
    # module does not attempt using any global http proxy.
    ansible_httpapi_use_proxy: false
  children:
    nokia_srsim:
      vars:
        ansible_network_os: nokia.sros.md
        # default connection type for nodes of this kind
        # feel free to override this in your inventory
        ansible_connection: ansible.netcommon.network_cli
        ansible_user: admin
        ansible_password: NokiaSros1!
      hosts:
        clab-rapha-project-R1:
          ansible_host: 172.20.20.24
        clab-rapha-project-R11:
          ansible_host: 172.20.20.30
        clab-rapha-project-R12:
          ansible_host: 172.20.20.31
        clab-rapha-project-R13:
          ansible_host: 172.20.20.27
        clab-rapha-project-R14:
          ansible_host: 172.20.20.26
        clab-rapha-project-R2:
          ansible_host: 172.20.20.29
        clab-rapha-project-R3:
          ansible_host: 172.20.20.28
        clab-rapha-project-R4:
          ansible_host: 172.20.20.25
